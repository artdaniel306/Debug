trigger:
  branches:
    include:
      - production

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: Daniel_CI_Debug
  - name: GITHUB_ORG
    value: 'artdaniel306'
  - name: GITHUB_REPO
    value: 'Debug'

steps:
  - checkout: self
    persistCredentials: true
    fetchDepth: 0  # ← 修正問題 1，抓完整 git 歷史

  - script: |
      git config user.email "daniel.li@artsolutions.io"
      git config user.name "Azure Pipeline Bot"

      git remote set-url origin https://$(GITHUB_PAT)@github.com/$(GITHUB_ORG)/$(GITHUB_REPO).git

      git fetch --all

      FEATURE_BRANCHES=$(git branch -r | grep 'origin/feature/' | sed 's|origin/||' | tr -d ' ')

      if [ -z "$FEATURE_BRANCHES" ]; then
        echo "No feature branches found."
        exit 0
      fi

      for BRANCH in $FEATURE_BRANCHES; do
        echo "========================================="
        echo "Processing branch: $BRANCH"
        echo "========================================="

        git checkout $BRANCH

        if git merge origin/production --no-edit; then
          echo "✅ Merge successful for $BRANCH, pushing..."
          git push origin $BRANCH
        else
          echo "⚠️ Merge conflict on $BRANCH, creating GitHub PR..."
          git merge --abort 2>/dev/null || true  # ← 修正問題 2

          # 修正問題 3，改用變數存放 JSON 再傳入
          PR_PAYLOAD="{\"title\": \"[Auto] Sync production → $BRANCH (conflict)\", \"body\": \"production 有更新，自動 merge 時發現衝突，請手動解決。\", \"head\": \"production\", \"base\": \"$BRANCH\"}"

          curl -s -X POST \
            -H "Authorization: token $(GITHUB_PAT)" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/$(GITHUB_ORG)/$(GITHUB_REPO)/pulls \
            -d "$PR_PAYLOAD"
        fi
      done
    displayName: 'Sync production to all feature branches'
    env:
      GITHUB_PAT: $(GITHUB_PAT)