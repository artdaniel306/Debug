trigger:
  branches:
    include:
      - production   # 只有 production branch 有變動時才觸發

pool:
  vmImage: 'ubuntu-latest'

variables:
  # 這些變數會在 Step 2 設定
  AZURE_DEVOPS_ORG: $(System.TeamFoundationCollectionUri)
  PROJECT_NAME: $(System.TeamProject)
  REPO_NAME: $(Build.Repository.Name)

steps:
  - checkout: self
    persistCredentials: true   # 讓 git 指令可以使用認證

  - script: |
      # 設定 git 身份
      git config user.email "daniel.li@artsolutions.io"
      git config user.name "Azure Pipeline Bot"

      # 取得所有遠端 branch
      git fetch --all

      # 列出所有 feature branch
      FEATURE_BRANCHES=$(git branch -r | grep 'origin/feature/' | sed 's|origin/||' | tr -d ' ')

      if [ -z "$FEATURE_BRANCHES" ]; then
        echo "No feature branches found."
        exit 0
      fi

      for BRANCH in $FEATURE_BRANCHES; do
        echo "========================================="
        echo "Processing branch: $BRANCH"
        echo "========================================="

        # 切換到 feature branch
        git checkout $BRANCH

        # 嘗試 merge production
        if git merge origin/production --no-edit; then
          echo "✅ Merge successful for $BRANCH, pushing..."
          git push origin $BRANCH
        else
          echo "⚠️ Merge conflict on $BRANCH, creating PR..."
          git merge --abort

          # 呼叫 REST API 建立 PR
          PR_TITLE="[Auto] Sync production → $BRANCH (conflict)"
          PR_BODY="production 有更新，自動 merge 時發現衝突，請手動解決。"

          curl -s -X POST \
            "$AZURE_DEVOPS_ORG$PROJECT_NAME/_apis/git/repositories/$REPO_NAME/pullrequests?api-version=7.1" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $(System.AccessToken)" \
            -d "{
              \"title\": \"$PR_TITLE\",
              \"description\": \"$PR_BODY\",
              \"sourceRefName\": \"refs/heads/production\",
              \"targetRefName\": \"refs/heads/$BRANCH\"
            }"
        fi
      done
    displayName: 'Sync production to all feature branches'
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)  # 注入 Pipeline 的 token