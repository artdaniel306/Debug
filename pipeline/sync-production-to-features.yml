trigger:
  branches:
    include:
      - production

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: Daniel_CI_Debug  # ← 替換成你在 Library 建立的 Variable Group 名稱

steps:
  - checkout: self
    persistCredentials: true

  - script: |
      git config user.email "daniel.li@artsolutions.io"  # ← 可替換成你們團隊的 email
      git config user.name "Azure Pipeline Bot"          # ← 可替換成任意顯示名稱

      # 設定 GitHub 認證，讓 git push 可以使用 PAT
      git remote set-url origin https://$(GITHUB_PAT)@github.com/artdaniel306/Debug.git
      # ↑ 替換 YOUR_ORG（GitHub username 或 org name）
      # ↑ 替換 YOUR_REPO（repo name）

      git fetch --all

      FEATURE_BRANCHES=$(git branch -r | grep 'origin/feature/' | sed 's|origin/||' | tr -d ' ')

      if [ -z "$FEATURE_BRANCHES" ]; then
        echo "No feature branches found."
        exit 0
      fi

      for BRANCH in $FEATURE_BRANCHES; do
        echo "========================================="
        echo "Processing branch: $BRANCH"
        echo "========================================="

        git checkout $BRANCH

        if git merge origin/production --no-edit; then
          echo "✅ Merge successful for $BRANCH, pushing..."
          git push origin $BRANCH
        else
          echo "⚠️ Merge conflict on $BRANCH, creating GitHub PR..."
          git merge --abort

          curl -s -X POST \
            -H "Authorization: token $(GITHUB_PAT)" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/artdaniel306/Debug/pulls \
            # ↑ 替換 YOUR_ORG 與 YOUR_REPO
            -d "{
              \"title\": \"[Auto] Sync production → $BRANCH (conflict)\",
              \"body\": \"production 有更新，自動 merge 時發現衝突，請手動解決。\",
              \"head\": \"production\",
              \"base\": \"$BRANCH\"
            }"
        fi
      done
    displayName: 'Sync production to all feature branches'
    env:
      GITHUB_PAT: $(GITHUB_PAT)  # 從 Variable Group 注入